name: Linux Lab

on:
  workflow_dispatch:
    inputs:
      iso:
        description: "ISO Download URL"
        required: true
        default: "https://geo.mirror.pkgbuild.com/iso/latest/archlinux-x86_64.iso"

      ram:
        description: "RAM (MB)"
        required: true
        default: "4096"

      cpu:
        description: "CPU Cores"
        required: true
        default: "2"

      disk:
        description: "Disk Size"
        required: true
        default: "20G"

      resolution:
        description: "Resolution"
        required: true
        default: "1920x1080"

jobs:
  arch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install packages
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            qemu-system-x86 \
            qemu-utils \
            novnc \
            websockify \
            ovmf \
            wget

      - name: Find OVMF firmware
        run: |
          echo "=================================="
          echo " Searching for OVMF Firmware"
          echo "=================================="

          find /usr/share -type f \( \
            -name "*OVMF*" -o \
            -name "*.fd" \
          \) | sort

          echo
          echo "=================================="
          echo "Done!"
          echo "=================================="

      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared

      - name: Download ISO
        run: |
          echo "Downloading ISO..."
          echo "${{ github.event.inputs.iso }}"

          wget \
            --show-progress \
            -O linux.iso \
            "${{ github.event.inputs.iso }}"

      - name: Prepare UEFI Firmware
        run: |
          cp /usr/share/OVMF/OVMF_VARS_4M.fd OVMF_VARS.fd

      - name: Create Virtual Disk
        run: |
          echo "Creating virtual disk..."

          qemu-img create \
            -f qcow2 \
            -o lazy_refcounts=on \
            arch.qcow2 \
            ${{ github.event.inputs.disk }}

          echo
          echo "===== Disk Information ====="
          qemu-img info arch.qcow2

      - name: Linux Lab Info
        run: |
           echo "===================================="
           echo "        🧪 LINUX LAB"
           echo "===================================="
           echo ""
           echo "CPU : ${{ github.event.inputs.cpu }}"
           echo "RAM : ${{ github.event.inputs.ram }} MB"
           echo "Disk: ${{ github.event.inputs.disk }}"
           echo "Res : ${{ github.event.inputs.resolution }}"
           echo ""    

       - name: Start OS Lab VM
        run: |
          echo "Starting UEFI VM..."

          qemu-system-x86_64 \
            -m ${{ github.event.inputs.ram }} \
            -smp ${{ github.event.inputs.cpu }},sockets=1,cores=${{ github.event.inputs.cpu }},threads=1 \
            \
            -machine q35 \
            -cpu max \
            \
            -drive if=pflash,format=raw,readonly=on,file=/usr/share/OVMF/OVMF_CODE_4M.fd \
            -drive if=pflash,format=raw,file=OVMF_VARS.fd \
            \
            -drive file=linux.iso,format=raw,media=cdrom \
            -drive file=arch.qcow2,format=qcow2,if=virtio,cache=unsafe,aio=threads,discard=unmap \
            \
            -boot menu=on \
            \
            -device virtio-vga \
            \
            -netdev user,id=net0 \
            -device virtio-net-pci,netdev=net0 \
            \
            -display none \
            -vnc :0 \
            \
            -rtc base=utc \
            -audiodev none,id=noaudio \
            \
            > qemu.log 2>&1 &

          sleep 10

          echo "===== QEMU Log ====="
          cat qemu.log || true

          echo
          echo "===== Running QEMU ====="
          ps -ef | grep qemu || true

          echo
          echo "===== Listening Ports ====="
          ss -tlnp || true

      - name: Start noVNC
        run: |
          echo "Starting noVNC..."

          websockify \
            --web=/usr/share/novnc \
            6080 \
            localhost:5900 \
            > novnc.log 2>&1 &

          sleep 5

          echo
          echo "===== noVNC Process ====="
          ps -ef | grep websockify || true

          echo
          echo "===== Listening Ports ====="
          ss -tlnp | grep -E "5900|6080" || true

          echo
          echo "===== noVNC Log ====="
          cat novnc.log || true

          sleep 5

      - name: Start Cloudflare Tunnel
        run: |
          cloudflared tunnel --url http://localhost:6080 > tunnel.log 2>&1 &

          echo "Waiting for tunnel..."
          sleep 15

          URL=$(grep -o 'https://[^ ]*trycloudflare.com' tunnel.log | head -1)

          echo ""
          echo "========================================"
          echo "🧪 LINUX LAB IS READY!"
          echo "========================================"
          echo ""
          echo "🌍 Browser:"
          echo "${URL}/vnc.html?autoconnect=1&resize=scale&show_dot=0"
          echo ""
          echo "========================================"

          cat tunnel.log

      - name: Keep Runner Alive
        run: |
          echo "Arch Lab is running!"
          echo "Leave this workflow open while using the VM."

          while true; do
            sleep 60
          done
