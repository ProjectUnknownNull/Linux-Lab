name: Arch Lab

on:
  workflow_dispatch:

jobs:
  arch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-x86 \
            qemu-utils \
            novnc \
            websockify \
            wget

      - name: Download Arch ISO
        run: |
          wget -O archlinux.iso https://geo.mirror.pkgbuild.com/iso/latest/archlinux-x86_64.iso

      - name: Create virtual disk
        run: |
          qemu-img create -f qcow2 arch.qcow2 20G

      - name: Start Arch VM
        run: |
          qemu-system-x86_64 \
            -m 2048 \
            -smp 2 \
            -drive file=arch.qcow2,format=qcow2 \
            -cdrom archlinux.iso \
            -boot d \
            -audiodev none,id=noaudio \
            -machine pc \
            -vnc :0 \
            > qemu.log 2>&1 &

          sleep 10

      - name: Start noVNC
        run: |
          websockify --web=/usr/share/novnc/ 6080 localhost:5900 > novnc.log 2>&1 &

          sleep 5

      - name: Check everything
        run: |
          echo "===== QEMU ====="
          ps -ef | grep qemu || true

          echo
          echo "===== noVNC ====="
          ps -ef | grep websockify || true

          echo
          echo "===== Listening Ports ====="
          ss -tln

          echo
          echo "===== noVNC Log ====="
          cat novnc.log || true
