name: Arch Lab

on:
  workflow_dispatch:
    inputs:
      ram:
        description: "RAM (MB)"
        required: true
        default: "4096"

      cpu:
        description: "CPU Cores"
        required: true
        default: "2"

      disk:
        description: "Disk Size"
        required: true
        default: "20G"

      resolution:
        description: "Resolution"
        required: true
        default: "1920x1080"

jobs:
  arch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-x86 \
            qemu-utils \
            novnc \
            websockify \
            wget

      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared

      - name: Download Arch ISO
        run: |
          wget -O archlinux.iso https://geo.mirror.pkgbuild.com/iso/latest/archlinux-x86_64.iso

      - name: Create virtual disk
        run: |
          qemu-img create -f qcow2 arch.qcow2 ${{ github.event.inputs.disk }}

      - name: Start Arch VM
        run: |
          qemu-system-x86_64 \
            -m ${{ github.event.inputs.ram }} \
            -smp ${{ github.event.inputs.cpu }} \
            -drive file=arch.qcow2,format=qcow2 \
            -cdrom archlinux.iso \
            -boot d \
            -audiodev none,id=noaudio \
            -machine pc \
            -vnc :0 \
            > qemu.log 2>&1 &

          sleep 10

      - name: Start noVNC
        run: |
          websockify --web=/usr/share/novnc/ 6080 localhost:5900 > novnc.log 2>&1 &

          sleep 5

      - name: Start Cloudflare Tunnel
        run: |
          cloudflared tunnel --url http://localhost:6080 > tunnel.log 2>&1 &

          echo "Waiting for tunnel..."
          sleep 15

          echo "===== Tunnel Log ====="
          cat tunnel.log

      - name: Keep Runner Alive
        run: |
          echo "Arch Lab is running!"
          echo "Leave this workflow open while using the VM."

          while true; do
            sleep 60
          done
