name: Arch Lab

on:
  workflow_dispatch:

jobs:
  arch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-x86 \
            qemu-utils \
            wget

      - name: Download Arch ISO
        run: |
          wget -O archlinux.iso https://geo.mirror.pkgbuild.com/iso/latest/archlinux-x86_64.iso

      - name: Create virtual disk
        run: |
          qemu-img create -f qcow2 arch.qcow2 20G

      - name: Boot Arch VM
        run: |
          qemu-system-x86_64 \
            -m 2048 \
            -smp 2 \
            -drive file=arch.qcow2,format=qcow2 \
            -cdrom archlinux.iso \
            -boot d \
            -audiodev none,id=noaudio \
            -machine pc \
            -vnc :0 \
            > qemu.log 2>&1 &

          sleep 10

          echo "===== QEMU LOG ====="
          cat qemu.log || true

          echo "===== RUNNING PROCESSES ====="
          ps -ef | grep qemu
